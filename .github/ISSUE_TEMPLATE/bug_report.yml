name: Bug report
description: Something isn't working right
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: environment
    attributes:
      label: "Environment"
      description: "Browser, OS, device — whatever is relevant"
      placeholder: "e.g. Chrome on macOS, Firefox on Android..."
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: "What happened?"
      description: "What did you do, what did you expect, and what actually happened?"
      placeholder: "Steps to reproduce, expected vs actual behavior..."
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: "Anything else?"
      description: "Logs, screenshots, ideas — whatever might help"
